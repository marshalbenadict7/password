<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light text-center">

<div class="container mt-5">
    <div class="card mx-auto shadow" style="max-width:350px;">
        <div class="card-body">

            <h3>🔐 Password Generator</h3>

            <input type="text" id="result" class="form-control mt-3" readonly>

            <label class="mt-3">Length: <span id="lenVal">8</span></label>
            <input type="range" min="4" max="20" value="8" id="length" class="form-range" onchange="updateLen()">

            <button onclick="generate()" class="btn btn-primary w-100 mt-3">Generate</button>
            <button onclick="copy()" class="btn btn-success w-100 mt-2">Copy</button>

        </div>
    </div>
</div>

<script>

function updateLen(){
    document.getElementById("lenVal").innerHTML = document.getElementById("length").value;
}

function generate(){
    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
    let length = document.getElementById("length").value;

    let password = "";

    for(let i=0; i<length; i++){
        let random = Math.floor(Math.random() * chars.length);
        password += chars[random];
    }

    document.getElementById("result").value = password;
}

function copy(){
    let text = document.getElementById("result");
    text.select();
    document.execCommand("copy");
    alert("Copied!");
}

</script>

</body>
</html>
